# Prefix: Ctrl+a thay vì Ctrl+b (dễ bấm hơn)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on
unbind -n MouseDown3Pane

# Vi-style copy mode + copy to Windows clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "win32yank.exe -i"

# 256 color + true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Split pane dễ nhớ: | và -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window giữ current path
bind c new-window -c "#{pane_current_path}"

# Chuyển pane bằng Alt+hjkl (không cần prefix)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Bắt đầu đếm từ 1 (dễ bấm hơn 0)
set -g base-index 1
setw -g pane-base-index 1

# Giữ tên window sau khi rename
set -g allow-rename off
set -g automatic-rename off

# History lớn hơn
set -g history-limit 50000

# Pane border highlight
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

# Dim inactive panes
set -g window-style 'bg=colour235'
set -g window-active-style 'bg=terminal'

# Catppuccin theme
run ~/.config/tmux/plugins/catppuccin-tmux/catppuccin.tmux

# Status bar modules
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session} #{E:@catppuccin_status_date_time}"
set -g @catppuccin_date_time_text " %H:%M"

# Resurrect (save/restore sessions)
run ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux

# Continuum (auto save every 15 min + auto restore)
set -g @continuum-save-interval '5'
set -g @continuum-restore 'on'
run ~/.config/tmux/plugins/tmux-continuum/continuum.tmux

# Reload config nhanh
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
